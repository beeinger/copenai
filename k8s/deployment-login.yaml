# Kubernetes deployment using Cursor CLI browser/device login (no CURSOR_API_KEY).
#
# Cursor OAuth tokens are stored under $HOME/.cursor on the PVC (/data/.cursor).
# After first login they survive pod restarts.
#
# Bootstrap:
#   ./k8s/bootstrap-login.sh
#
# Or manually:
#   kubectl apply -f k8s/deployment-login.yaml
#   kubectl exec -it deploy/copenai -n copenai -- copenai auth login
#   kubectl exec -it deploy/copenai -n copenai -- copenai auth status
#   kubectl exec -it deploy/copenai -n copenai -- copenai keys add --name default
#
apiVersion: v1
kind: Namespace
metadata:
  name: copenai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copenai-data
  namespace: copenai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copenai
  namespace: copenai
  labels:
    app: copenai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: copenai
  template:
    metadata:
      labels:
        app: copenai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: copenai
          image: ghcr.io/beeinger/copenai:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9241
              protocol: TCP
          env:
            - name: COPENAI_HOME
              value: /data
            # Cursor agent stores OAuth session files here (e.g. /data/.cursor).
            - name: HOME
              value: /data
            - name: RUST_LOG
              value: info
            # Optional: force URL-only login even with -it TTY
            # - name: NO_OPEN_BROWSER
            #   value: "1"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: copenai-data
---
apiVersion: v1
kind: Service
metadata:
  name: copenai
  namespace: copenai
  labels:
    app: copenai
spec:
  type: ClusterIP
  selector:
    app: copenai
  ports:
    - name: http
      port: 9241
      targetPort: http
      protocol: TCP
