# Copy and fill in before applying (API-key auth only).
# For browser/device login instead, use deployment-login.yaml.
#
#   kubectl create namespace copenai --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic copenai-secrets \
#     --namespace copenai \
#     --from-literal=CURSOR_API_KEY='your-cursor-api-key' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or apply this file after replacing the placeholder (do not commit real keys).
apiVersion: v1
kind: Secret
metadata:
  name: copenai-secrets
  namespace: copenai
type: Opaque
stringData:
  CURSOR_API_KEY: replace-me
